<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MakeCode Image Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">

    <header>
      <div class="header-inner">
        <div>
          <h1>MakeCode Image Generator</h1>
          <p class="subtitle">Convert any image into a MakeCode Arcade sprite or background</p>
        </div>
        <button class="theme-toggle" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
          <!-- Sun: shown in dark mode to switch back to light -->
          <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <!-- Moon: shown in light mode to switch to dark -->
          <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Row 1: Upload square (left) + Preview (right) -->
    <div class="top-row">
      <section class="card upload-card" id="upload-card">
        <label class="upload-label" for="file-input">
          <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <span class="upload-text" id="upload-text">Click or drag &amp; drop</span>
          <span class="upload-hint">PNG, JPG, GIF, WebP</span>
          <input type="file" id="file-input" accept="image/*">
        </label>
      </section>

      <section class="card preview-card">
        <div class="preview-empty" id="preview-empty">
          <svg xmlns="http://www.w3.org/2000/svg" width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <p>Preview appears here</p>
        </div>
        <div class="preview-content" id="preview-content" hidden>
          <p class="preview-label" id="preview-label"></p>
          <div class="canvas-wrapper">
            <canvas id="preview-canvas"></canvas>
          </div>
        </div>
      </section>
    </div>

    <!-- Row 2: Settings -->
    <section class="card controls-card">
      <h2>Settings</h2>
      <div class="controls-row">

        <div class="control-group">
          <label>Type</label>
          <div class="type-toggle" id="type-toggle">
            <button class="type-btn active" data-type="sprite">Sprite</button>
            <button class="type-btn" data-type="background">Background</button>
          </div>
        </div>

        <div class="control-group">
          <label for="resolution">Resolution</label>
          <select id="resolution">
            <option value="8">8 × 8</option>
            <option value="16" selected>16 × 16</option>
            <option value="32">32 × 32</option>
            <option value="64">64 × 64</option>
            <option value="custom">Custom…</option>
          </select>
        </div>

        <div class="control-group" id="custom-size" hidden>
          <label>Size</label>
          <div class="custom-size-inputs">
            <input type="number" id="custom-w" min="1" max="1000" value="16" placeholder="W">
            <span class="times">×</span>
            <input type="number" id="custom-h" min="1" max="1000" value="16" placeholder="H">
          </div>
        </div>

        <div class="control-group control-group-check">
          <label class="checkbox-label">
            <input type="checkbox" id="greyscale">
            <span>Greyscale</span>
          </label>
        </div>

        <button class="btn btn-primary" id="generate-btn">Generate Code</button>
      </div>

      <!-- Colors used — hidden until first generation -->
      <div class="palette-section" id="palette-section" hidden>
        <p class="palette-heading">Colors used</p>
        <div class="palette-swatches" id="palette-swatches"></div>
      </div>
    </section>

    <!-- Row 3: Generated code (full width) -->
    <section class="card output-card" id="output-card" hidden>
      <div class="output-header">
        <h2>Generated Code</h2>
        <button class="btn btn-secondary" id="copy-btn">Copy Code</button>
      </div>
      <pre class="code-block"><code id="output"></code></pre>
    </section>

    <footer class="credits">
      Made with ♥ for the MakeCode gaming community &nbsp;·&nbsp; by <strong>LazerTag team</strong>
    </footer>
  </div>

  <div class="toast" id="toast" role="alert" aria-live="assertive"></div>

  <script src="app.js"></script>
</body>
</html>
